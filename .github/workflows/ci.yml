name: CI

on:
  push:
    branches: [main, "novus/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Frontend — lint, test, build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (lint · test · build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test

      - name: Build (production)
        run: pnpm build
        env:
          # Suppress Next.js telemetry in CI
          NEXT_TELEMETRY_DISABLED: 1

  # ---------------------------------------------------------------------------
  # Soroban contract — build to WASM
  # ---------------------------------------------------------------------------
  contract:
    name: Soroban Contract (build · test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run contract unit tests
        working-directory: contracts/divify-splitter
        run: cargo test --features testutils -- --nocapture

      - name: Build contract to WASM
        working-directory: contracts/divify-splitter
        run: cargo build --target wasm32-unknown-unknown --release
